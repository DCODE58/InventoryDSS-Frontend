<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - IO DSS</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/dashboard.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="navbar-placeholder"></div>
    <div class="layout">
        <div id="sidebar-placeholder"></div>
        <main class="content">
            <h1>Dashboard</h1>
            <div class="stats-grid">
                <div class="card" id="total-products-card">
                    <h3>Total Products</h3>
                    <p class="stat-value">-</p>
                </div>
                <div class="card" id="low-stock-card">
                    <h3>Low Stock Items</h3>
                    <p class="stat-value">-</p>
                </div>
                <div class="card" id="reorder-alerts-card">
                    <h3>Reorder Alerts</h3>
                    <p class="stat-value">-</p>
                </div>
                <div class="card" id="forecast-demand-card">
                    <h3>Forecasted Demand</h3>
                    <p class="stat-value">-</p>
                </div>
            </div>

            <div class="row">
                <section class="card alerts-section">
                    <h2><i class="fas fa-exclamation-triangle"></i> ROP Alerts</h2>
                    <div id="rop-alerts-list">Loading...</div>
                </section>
                <section class="card eoq-section">
                    <h2><i class="fas fa-boxes"></i> EOQ Recommendations</h2>
                    <div id="eoq-list">Loading...</div>
                </section>
            </div>

            <section class="card forecast-section">
                <h2><i class="fas fa-chart-line"></i> Demand Forecast (Next 30 Days)</h2>
                <canvas id="forecast-chart" width="400" height="200"></canvas>
            </section>
        </main>
    </div>

    <script src="config/config.js"></script>
    <script src="utils/constants.js"></script>
    <script src="utils/helpers.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/dashboard.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // Load components
        fetch('components/navbar.html')
            .then(res => res.text())
            .then(data => document.getElementById('navbar-placeholder').innerHTML = data);
        fetch('components/sidebar.html')
            .then(res => res.text())
            .then(data => document.getElementById('sidebar-placeholder').innerHTML = data);
    </script>
</body>
</html>
