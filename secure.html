<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Using a high-res landscape background */
            background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') no-repeat center center/cover;
        }

        .login-card {
            width: 350px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
            color: white;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 10px;
            text-align: left;
        }

        p.subtitle {
            font-size: 0.9rem;
            margin-bottom: 30px;
            text-align: left;
            opacity: 0.9;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            outline: none;
            color: white;
            font-size: 1rem;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .options {
            display: flex;
            align-items: center;
            font-size: 0.85rem;
            margin-bottom: 25px;
        }

        .options input {
            margin-right: 8px;
            accent-color: #76b852;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(to right, #b8c121, #2ebf6c);
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .login-btn:hover {
            transform: scale(1.02);
        }

        .footer-text {
            margin-top: 20px;
            font-size: 0.85rem;
        }

        .footer-text span {
            font-weight: bold;
            cursor: pointer;
        }

        .creator {
            margin-top: 30px;
            font-size: 0.75rem;
            opacity: 0.8;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Login</h2>
        <p class="subtitle">Welcome back please login to your account</p>
        
        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="username" placeholder="User Name" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>
            
            <div class="options">
                <input type="checkbox" id="remember">
                <label for="remember">Remember me</label>
            </div>

            <button type="submit" class="login-btn">Login</button>
        </form>

        <p class="footer-text">Don't have an account? <span>Signup</span></p>
        <p class="creator">by <strong>D4V3</strong></p>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        
        // Hardcoded Credentials
        const VALID_USER = "Admin";
        const VALID_PASS = "admin001";

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const userInp = document.getElementById('username').value;
            const passInp = document.getElementById('password').value;

            if (userInp === VALID_USER && passInp === VALID_PASS) {
                alert("Login Successful! Redirecting...");
                window.location.href = "index.html"; 
            } else {
                alert("Invalid username or password. Please try again.");
            }
        });
    </script>
</body>
</html>
